	#Obtainment settings for Witch of Vainglory.
	[witch_of_vainglory.obtainment]
		#Magicule cost required to naturally acquire the skill. Set to 0 for no MP cost.
		# Default: 300000.0
		# Range: 0.0 ~ 1.7976931348623157E308
		acquirementMagiculeCost = 300000.0
		#Starting mastery value when acquired. 0 means no starting mastery.
		# Default: 0
		# Range: > -1
		acquirementMastery = 0
		#Required skill registry ID for obtainment. Empty string disables the required skill check.
		requiredSkillId = "tensura:tuner"
		#If true, the required skill must be mastered before Witch of Vainglory can be acquired.
		requiredSkillMustBeMastered = true

