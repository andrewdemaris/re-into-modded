#Per-race tuning. Every addon race gets a section with an 'enabled' flag plus
#its attribute bonuses, starting-EP range, and evolution EP gate.
#
#Disabling a BASE race (Angel, Frog, Monkey, Whisper Djinn, Fledgling Bloodfiend,
#Gazer) removes it from the reincarnation pool. Disabling an evolved race keeps
#the flag in place for future use â€” currently it has no gameplay effect.
#
#The MOVEMENT_SPEED bonus is a multiplier (0.20 = +20%), applied on top of the
#entity's base speed. All other bonuses are flat adds.
[Races]

	#Angel line â€” Holy alignment, flight-focused.
	[Races.Angel]

		#Angel â€” attribute bonuses and EP thresholds.
		[Races.Angel.angel]
			#Enable Angel.
			#Base races: when false, removed from the reincarnation pool.
			#Evolved races: reserved for future use, currently cosmetic.
			enabled = true
			#Flat bonus to max HP applied while this race is active. 0 = no modifier.
			# Default: 80.0
			# Range: 0.0 ~ 1000000.0
			maxHealthBonus = 80.0
			#Flat bonus to max spiritual HP applied while this race is active. 0 = no modifier.
			# Default: 480.0
			# Range: 0.0 ~ 1000000.0
			spiritualHealthBonus = 480.0
			#Multiplier bonus to movement speed (0.20 = +20%). Negative = slower. 0 = no modifier.
			# Default: 0.2
			# Range: -1.0 ~ 100.0
			movementSpeedBonus = 0.2
			#Flat bonus to melee attack damage. 0 = no modifier.
			# Default: 3.0
			# Range: 0.0 ~ 1000.0
			attackDamageBonus = 3.0
			#Minimum starting EP rolled when this race is assigned. Used only for base races.
			#Set both min and max to 0 to skip the roll (correct default for evolved races).
			# Default: 10000.0
			# Range: 0.0 ~ 1.0E12
			startingEpMin = 10000.0
			#Maximum starting EP rolled when this race is assigned. Used only for base races.
			# Default: 20000.0
			# Range: 0.0 ~ 1.0E12
			startingEpMax = 20000.0
			#EP required to evolve INTO this race. 0 = no EP gate from config (base races,
			#or evolved races whose evolution uses only non-EP requirements).
			# Default: 0.0
			# Range: 0.0 ~ 1.0E12
			evolutionEpRequirement = 0.0
			#Bonus EP granted automatically when a player evolves INTO this race.
			#Defaults to 50% of evolutionEpRequirement â€” a player who just paid
			#the entry cost gets half of it back as a head start. Set to 0 to
			#disable the bonus for this race.
			# Default: 0.0
			# Range: 0.0 ~ 1.0E12
			bonusEpOnEvolve = 0.0

